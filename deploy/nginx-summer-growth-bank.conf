server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.html;

    location = / {
        return 302 /summer-growth-bank/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /summer-growth-bank/ {
        alias /var/www/summer-growth-bank/;
        index index.html;
        try_files $uri $uri/ /summer-growth-bank/index.html;
    }
}
